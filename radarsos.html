<!doctype html>
<html lang="pt-BR">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Radar de Crise — SOS</title>

<style>

:root{
--bg:#0f1115;
--text:#e9edf6;
--muted:#aab3c5;
--line:rgba(255,255,255,.08);
--accent:#64d6a0;
--danger:#ff6b6b;
--radius:18px;
--sans:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial;
--max:900px;
}

/* FUNDO AJUSTADO */

body{

margin:0;
font-family:var(--sans);
color:var(--text);
background-color:#0f1115;

background-image:
radial-gradient(900px 500px at 15% -5%, rgba(100,214,160,.12), transparent 60%),
radial-gradient(700px 400px at 85% -5%, rgba(242,182,108,.10), transparent 65%),
radial-gradient(900px 700px at 50% 120%, rgba(100,214,160,.08), transparent 70%);

background-repeat:no-repeat;
background-attachment:fixed;

padding-bottom:90px;

}

/* CONTAINER */

.wrap{

max-width:var(--max);
margin:auto;
padding:20px;

background:linear-gradient(
180deg,
rgba(15,17,21,0.92),
rgba(15,17,21,0.96)
);

border-radius:28px;

}

/* HEADER */

header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}

.title{

font-weight:800;
font-size:18px;

}

.subtitle{

color:var(--muted);
font-size:12px;

}

/* BOTÕES */

button{

border:1px solid var(--line);
background:#1a2132;
color:white;

padding:12px 14px;

border-radius:12px;

font-weight:600;

cursor:pointer;

}

/* CHIPS */

.chips{

display:flex;
flex-wrap:wrap;
gap:8px;

}

.chip{

border:1px solid var(--line);
padding:10px;
border-radius:999px;
cursor:pointer;
font-size:13px;

}

.chip.active{

background:#64d6a020;

border-color:#64d6a0;

}

/* INTENSIDADE */

.levels{

display:grid;
gap:10px;
margin-top:10px;

}

.level{

border:1px solid var(--line);
padding:15px;
border-radius:14px;
cursor:pointer;

}

.level.active{

border-color:#64d6a0;
background:#64d6a015;

}

/* BOX */

.box{

border:1px solid var(--line);
border-radius:14px;
padding:16px;
margin-top:10px;

background:#0f1115cc;

backdrop-filter:blur(6px);

}

.label{

font-size:11px;
letter-spacing:.1em;
color:var(--muted);

}

.txt{

font-weight:700;
margin-top:6px;

}

/* CORES */

.bad{

border-color:#ff6b6b;
background:#ff6b6b15;

}

.good{

border-color:#64d6a0;
background:#64d6a015;

}

/* BOTTOM BAR */

.bottom{

position:fixed;
bottom:0;
left:0;
right:0;

background:#0f1115ee;

padding:12px;

border-top:1px solid var(--line);

}

.bottom button{

background:#64d6a0;
color:black;
width:100%;

}

</style>

</head>

<body>

<div class="wrap">

<header>

<div>

<div class="title">RADAR DE CRISE</div>

<div class="subtitle">Dr Fabio Schmidt • CRM-SP 183549</div>

</div>

<button onclick="risk()">🚨 risco</button>

</header>

<h3>1) O que está acontecendo?</h3>

<div class="chips" id="scenarios"></div>

<h3>2) Intensidade da crise</h3>

<div class="levels" id="levels"></div>

<div id="result"></div>

<button onclick="copy()" id="copy" disabled>Copiar resposta</button>

</div>

<div class="bottom">

<button onclick="panic()">🔥 Crise agora</button>

</div>

<script>

const scenarios=[

["Medo de abandono",
"Você tá paranoico de novo. Para de drama.",
"Entendo que isso te deixou inseguro. Deixa eu esclarecer minha intenção."
],

["Raiva explosiva",
"Você está exagerando.",
"Eu vejo que a raiva está forte agora. Vamos pausar."

],

["Culpa extrema",
"Para de se culpar.",
"Teve impacto sim, mas você não é definido por esse momento."

],

["Queda após melhora",
"Então por que você voltou a ficar assim?",
"Isso é um episódio, não uma recaída."

],

["Saídas / separações",
"Você vai ficar bem.",
"Vou sair por X tempo e volto depois."

],

]

let selectedScenario=0
let selectedLevel=0

function render(){

const s=document.getElementById("scenarios")
s.innerHTML=""

scenarios.forEach((c,i)=>{

let d=document.createElement("div")

d.className="chip"+(i==selectedScenario?" active":"")

d.innerText=c[0]

d.onclick=()=>{

selectedScenario=i
render()
}

s.appendChild(d)

})

const levels=["Leve","Moderada","Grave"]

const l=document.getElementById("levels")

l.innerHTML=""

levels.forEach((t,i)=>{

let d=document.createElement("div")

d.className="level"+(i==selectedLevel?" active":"")

d.innerHTML="<b>"+t+"</b>"

d.onclick=()=>{

selectedLevel=i
render()
show()

}

l.appendChild(d)

})

}

function show(){

const r=document.getElementById("result")

let c=scenarios[selectedScenario]

r.innerHTML=

"<div class='box bad'><div class='label'>FRASE QUE PIORA</div><div class='txt'>"+c[1]+"</div></div>"+

"<div class='box good'><div class='label'>SUBSTITUA POR</div><div class='txt'>"+c[2]+"</div></div>"

document.getElementById("copy").disabled=false

}

function copy(){

navigator.clipboard.writeText(scenarios[selectedScenario][2])

alert("copiado")

}

function panic(){

alert("Eu vejo que isso te deixou muito ferido. Vamos pausar e conversar quando estivermos mais calmos.")

}

function risk(){

alert("Se houver risco imediato procure emergência ou ligue CVV 188")

}

render()

</script>

</body>

</html>
