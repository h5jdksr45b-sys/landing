<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RADAR DE CRISE TPB</title>

  <style>
    :root{
      --bg:#0b0f16;
      --surface: rgba(16,20,28,.74);
      --surface2: rgba(255,255,255,.045);
      --text:#eef2ff;
      --muted:#a7b2cc;
      --line: rgba(255,255,255,.10);
      --accent:#66e0a6;
      --warn:#f1b46b;
      --danger:#ff6b6b;
      --info:#7aa7ff;
      --shadow: 0 22px 70px rgba(0,0,0,.52);
      --radius:18px;
      --radius2:14px;
      --max: 880px;
      --sans: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(920px 540px at 18% -8%, rgba(102,224,166,.15), transparent 62%),
        radial-gradient(860px 460px at 86% -8%, rgba(241,180,107,.13), transparent 66%),
        radial-gradient(980px 820px at 50% 120%, rgba(102,224,166,.11), transparent 72%),
        var(--bg);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      padding-bottom: 92px;
    }

    .wrap{
      max-width: var(--max);
      margin: 0 auto;
      padding: 14px 14px 28px;
    }

    .shell{
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(16,20,28,.72), rgba(16,20,28,.86));
      box-shadow: var(--shadow);
      border-radius: 26px;
      overflow:hidden;
    }

    .top{
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.05), transparent);
    }

    .brandRow{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
    }

    .brandLeft{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .logo{
      width:44px;
      height:44px;
      border-radius: 14px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
      object-fit: cover;
      flex: 0 0 auto;
    }

    .titles{ min-width:0; }

    .title{
      font-size: 30px;
      font-weight: 950;
      letter-spacing: .2px;
      line-height: 1.05;
      margin:0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subtitle{
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .chipBtn{
      border:1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 12px;
      font-weight: 900;
      font-size: 13px;
      cursor:pointer;
      user-select:none;
      white-space: nowrap;
    }
    .chipBtn:active{ transform: translateY(1px); }

    .content{ padding: 16px; }

    .section{ margin-top: 16px; }
    .sectionTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom: 10px;
    }
    .sectionTitle .h{
      font-weight: 950;
      font-size: 14px;
      letter-spacing: .2px;
    }
    .hint{
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.35;
    }

    .hero{
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(102,224,166,.14), rgba(255,255,255,.02));
      border-radius: 22px;
      padding: 14px;
    }
    .heroTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 10px;
    }
    .heroTitle{
      font-weight: 950;
      font-size: 14px;
      letter-spacing: .2px;
    }
    .heroSub{
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.35;
      margin-top: 6px;
    }

    .bigCTA{
      width:100%;
      border:none;
      border-radius: 18px;
      padding: 16px 14px;
      font-weight: 950;
      font-size: 15px;
      cursor:pointer;
      user-select:none;
      background: var(--accent);
      color:#06110c;
    }
    .bigCTA:active{ transform: translateY(1px); }

    .ctaRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top: 10px;
    }
    .ctaMini{
      border:1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 12px;
      font-weight: 900;
      font-size: 13px;
      cursor:pointer;
      user-select:none;
      flex: 1 1 180px;
    }
    .ctaMini:active{ transform: translateY(1px); }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 520px){
      .grid{ grid-template-columns: 1fr; }
      .title{ font-size: 28px; }
    }

    .tile{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      border-radius: var(--radius);
      padding: 12px 12px;
      cursor:pointer;
      user-select:none;
      transition: transform .08s ease;
      position: relative;
      overflow:hidden;
    }
    .tile:active{ transform: translateY(1px); }
    .tile.active{
      border-color: rgba(102,224,166,.55);
      background: linear-gradient(180deg, rgba(102,224,166,.14), rgba(255,255,255,.02));
    }
    .tile .k{
      font-weight: 950;
      font-size: 13.5px;
      line-height: 1.2;
    }
    .tile .d{
      margin-top: 6px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.35;
    }
    .badge{
      position:absolute;
      top:10px;
      right:10px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.20);
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 950;
      font-size: 11px;
      color: var(--muted);
      backdrop-filter: blur(8px);
    }

    .seg{
      display:flex;
      gap:8px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--line);
      padding: 8px;
      border-radius: 16px;
    }
    .segBtn{
      flex:1;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      border-radius: 12px;
      padding: 12px 10px;
      font-weight: 950;
      font-size: 13px;
      cursor:pointer;
      user-select:none;
      text-align:center;
    }
    .segBtn.active{
      color: var(--text);
      border-color: rgba(102,224,166,.55);
      background: rgba(102,224,166,.12);
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
      padding: 10px 12px;
      border-radius: 999px;
      font-weight: 950;
      font-size: 12.5px;
      color: var(--text);
      margin-top: 2px;
    }
    .dot{
      width:9px;
      height:9px;
      border-radius: 99px;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(102,224,166,.10);
    }
    .dot.mod{ background: var(--warn); box-shadow: 0 0 0 4px rgba(241,180,107,.10); }
    .dot.grv{ background: var(--danger); box-shadow: 0 0 0 4px rgba(255,107,107,.10); }

    .card{
      border: 1px solid var(--line);
      background: rgba(0,0,0,.16);
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 10px;
      backdrop-filter: blur(8px);
    }
    .label{
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 950;
    }
    .txt{
      margin-top: 8px;
      font-size: 15px;
      line-height: 1.45;
      font-weight: 900;
    }
    .subtxt{
      margin-top: 8px;
      color: rgba(238,242,255,.84);
      font-size: 13px;
      line-height: 1.45;
      font-weight: 650;
    }

    .card.bad{ border-color: rgba(255,107,107,.55); background: rgba(255,107,107,.10); }
    .card.info{ border-color: rgba(122,167,255,.55); background: rgba(122,167,255,.10); }
    .card.good{ border-color: rgba(102,224,166,.55); background: rgba(102,224,166,.10); }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top: 12px;
    }
    .btn{
      border:none;
      border-radius: 14px;
      padding: 14px 14px;
      font-weight: 950;
      font-size: 14px;
      cursor:pointer;
      user-select:none;
      flex: 1 1 160px;
    }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{ background: var(--accent); color:#06110c; }
    .btn.secondary{ background: rgba(255,255,255,.05); color: var(--text); border: 1px solid var(--line); }
    .btn.ghost{ background: transparent; color: var(--muted); border: 1px dashed rgba(255,255,255,.16); }

    .note{
      margin-top: 10px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.35;
    }

    .listItem{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 10px;
      cursor:pointer;
      user-select:none;
      position: relative;
      overflow:hidden;
    }
    .listItem:active{ transform: translateY(1px); }

    .lock{
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .teaser{
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(241,180,107,.12), rgba(255,255,255,.02));
      border-radius: 18px;
      padding: 14px;
      margin-top: 14px;
      position: relative;
      overflow:hidden;
    }
    .teaserTitle{
      font-weight: 950;
      font-size: 13.5px;
      margin-bottom: 6px;
    }
    .teaserSub{
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.35;
    }
    .blurRow{
      margin-top: 12px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      border-radius: 14px;
      padding: 12px;
      filter: blur(1.7px);
      opacity: .62;
      user-select:none;
    }
    .blurRow b{ font-size: 12.5px; }
    .blurRow div{ color: var(--muted); margin-top: 6px; font-size: 12.5px; }

    .bottom{
      position: fixed;
      left:0; right:0; bottom:0;
      background: rgba(11,15,22,.88);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(12px);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      z-index: 50;
    }
    .bottomInner{
      max-width: var(--max);
      margin: 0 auto;
      display:flex;
      justify-content: space-between;
      gap: 8px;
    }
    .nav{
      flex:1;
      text-align:center;
      border: 1px solid transparent;
      border-radius: 14px;
      padding: 10px 8px;
      color: var(--muted);
      cursor:pointer;
      user-select:none;
      font-weight: 950;
      font-size: 12px;
      line-height: 1.2;
    }
    .nav .ico{ font-size: 16px; display:block; margin-bottom: 4px; }
    .nav.active{
      color: var(--accent);
      border-color: rgba(102,224,166,.35);
      background: rgba(102,224,166,.08);
    }

    .toast{
      position: fixed;
      left:50%;
      bottom: 96px;
      transform: translateX(-50%);
      background: rgba(11,15,22,.92);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 950;
      font-size: 13px;
      display:none;
      z-index: 60;
      box-shadow: var(--shadow);
    }

    /* Modal */
    .modalBackdrop{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.56);
      backdrop-filter: blur(6px);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index: 80;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
    }
    .modal{
      width: min(880px, 100%);
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(16,20,28,.92), rgba(16,20,28,.98));
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .modalTop{
      padding: 14px 14px 12px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }
    .modalTitle{
      font-weight:950;
      font-size:16px;
      line-height:1.2;
    }
    .modalSub{
      color: var(--muted);
      font-size:12.5px;
      margin-top:6px;
      line-height:1.35;
    }
    .xbtn{
      border:1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 10px;
      font-weight: 950;
      cursor:pointer;
      user-select:none;
      white-space: nowrap;
    }
    .modalBody{ padding: 14px; }

    .kbd{
      display:inline-flex;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.22);
      border-radius: 10px;
      padding: 6px 9px;
      font-weight: 950;
      font-size: 12px;
      color: var(--muted);
      margin-left: 6px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="shell">
      <div class="top" id="top"></div>
      <div class="content" id="app"></div>
    </div>
  </div>

  <div class="bottom">
    <div class="bottomInner">
      <div class="nav active" id="nav-crise" onclick="openTab('crise')"><span class="ico">🚨</span>Crise</div>
      <div class="nav" id="nav-situacoes" onclick="openTab('situacoes')"><span class="ico">🧭</span>Situações</div>
      <div class="nav" id="nav-padroes" onclick="openTab('padroes')"><span class="ico">📊</span>Padrões</div>
      <div class="nav" id="nav-guia" onclick="openTab('guia')"><span class="ico">⚙️</span>Guia</div>
    </div>
  </div>

  <div class="toast" id="toast">Copiado.</div>

  <div class="modalBackdrop" id="modalBackdrop" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modalTop">
        <div>
          <div class="modalTitle" id="modalTitle">Título</div>
          <div class="modalSub" id="modalSub">Sub</div>
        </div>
        <button class="xbtn" onclick="hideModal()">Fechar</button>
      </div>
      <div class="modalBody" id="modalBody"></div>
    </div>
  </div>

<script>
  const LOGO_FILE = "701EA1DC-33CE-40FC-BA04-F655886CBA94.png";

  const STORAGE_KEY_HISTORY = "radar_tpb_free_history_v1";
  const STORAGE_KEY_LAST = "radar_tpb_free_last_v1";

  let tab = "crise";
  let selectedScenario = 0; // index em scenariosFree
  let selectedLevel = 1;    // default: moderada (mais comum em crise)
  let quickMode = true;     // abre com CRISE AGORA por padrão

  const levels = [
    { title: "Leve", desc: "Dá para conversar. Valide e organize o básico.", dot:"" },
    { title: "Moderada", desc: "Emoção alta. Reduza estímulo e debate.", dot:"mod" },
    { title: "Grave", desc: "Risco de escalada. Pausa + previsibilidade.", dot:"grv" }
  ];

  // FREE: 5 situações (com linguagem real)
  // Estrutura: cada uma tem gatilhos (frases comuns), erro, e respostas por intensidade
  const scenariosFree = [
    {
      id: "abandono",
      title: "Ela disse que você vai abandonar",
      short: "“Você vai sumir” • “Você não liga”",
      triggers: [
        "“Você vai me deixar igual todo mundo.”",
        "“Você vai sumir.”",
        "“Você não me ama de verdade.”"
      ],
      piora: "Para com isso. Você está exagerando.",
      porq: "Minimiza o medo e vira prova de abandono. A crise escala mais rápido.",
      estrutura: "Validar o medo → declarar intenção → dar previsibilidade (tempo/retorno).",
      resposta: [
        "Eu entendo que isso te deu medo. Minha intenção não é te abandonar. Vamos conversar com calma.",
        "Eu vejo que esse medo subiu agora. Eu estou aqui. Vamos desacelerar e eu vou ser bem claro com você.",
        "Agora ficou intenso. Pausa. Eu volto em 10 minutos. Eu não vou sumir. A gente retoma com calma."
      ]
    },
    {
      id: "raiva",
      title: "Ela está gritando e atacando",
      short: "raiva explosiva • ataque verbal",
      triggers: [
        "Gritos, acusações e insultos.",
        "“Você é horrível.”",
        "“Eu te odeio.”"
      ],
      piora: "Baixa o tom. Você está ridículo.",
      porq: "Humilha e aumenta vergonha. Vergonha vira raiva e a escalada acelera.",
      estrutura: "Validar a emoção → reduzir estímulo → limite curto (pausa) → retorno.",
      resposta: [
        "Eu vejo que você ficou muito irritada. Eu quero entender, sem briga.",
        "A emoção está alta. Eu vou falar pouco e com calma para não piorar. Vamos baixar o ritmo.",
        "Está escalando. Pausa agora. Eu volto em 10 minutos para retomar. Eu não vou discutir assim."
      ]
    },
    {
      id: "acusacao",
      title: "Ela acusou você de mentir ou trair",
      short: "“Eu sei que você…”",
      triggers: [
        "“Eu sei que você está mentindo.”",
        "“Você está me traindo.”",
        "“Eu vi no seu olhar.”"
      ],
      piora: "Você está louca. Isso é coisa da sua cabeça.",
      porq: "Parece gaslighting na crise. A pessoa sente que você está apagando a experiência dela.",
      estrutura: "Validar impacto → esclarecer intenção (sem debate longo) → proposta de pausa/retorno.",
      resposta: [
        "Eu entendo que isso te machucou. Eu quero esclarecer com calma.",
        "Eu vejo que isso virou certeza pra você. Vamos desacelerar: eu explico minha intenção, sem ataque agora.",
        "Agora está muito intenso. Pausa. Eu volto e a gente conversa com calma. Eu não vou brigar."
      ]
    },
    {
      id: "certeza",
      title: "Ela disse “você não me ama”",
      short: "pedido de certeza repetido",
      triggers: [
        "“Você não me ama.”",
        "“Se me amasse faria X.”",
        "“Fala que me ama agora.”"
      ],
      piora: "De novo isso? Já falei mil vezes.",
      porq: "Transforma insegurança em “erro”. A pessoa busca mais certeza e a crise aumenta.",
      estrutura: "Afirmar vínculo → nomear insegurança → previsibilidade curta (o que vai acontecer agora).",
      resposta: [
        "Eu te amo. Eu vejo que você ficou insegura agora. Vamos conversar com calma.",
        "Eu te amo. Agora eu vou ser previsível: eu fico aqui e a gente fala devagar, sem briga.",
        "Eu te amo. Pausa. Eu volto em 10 minutos e continuo com você. Eu não vou sumir."
      ]
    },
    {
      id: "culpa",
      title: "Ela está se culpando e se destruindo",
      short: "autopunição • vergonha",
      triggers: [
        "“Eu sou um lixo.”",
        "“Eu estraguei tudo.”",
        "“Eu só faço merda.”"
      ],
      piora: "Para de drama. Você faz isso pra chamar atenção.",
      porq: "Shame spiral: a vergonha cresce, e a pessoa se sente ainda mais sozinha.",
      estrutura: "Validar dor → reduzir pressão → passo mínimo agora (respirar/água/pausa) → retorno.",
      resposta: [
        "Eu vejo que isso está doendo muito. Vamos dar um passo pequeno agora, só o suficiente.",
        "Isso está pesando muito. Vamos reduzir a pressão e organizar uma coisa de cada vez.",
        "Primeiro vamos acalmar. Pausa. Água e respirar. Depois a gente pensa em reparação e solução."
      ]
    }
  ];

  // Quick tiles (o usuário em crise pensa em “o que aconteceu”, não em categoria)
  const quickTiles = [
    { label: "“Você vai me abandonar”", scenarioId:"abandono" },
    { label: "Gritando / atacando", scenarioId:"raiva" },
    { label: "“Você está mentindo / traindo”", scenarioId:"acusacao" },
    { label: "“Você não me ama”", scenarioId:"certeza" },
    { label: "“Eu sou um lixo / eu estraguei tudo”", scenarioId:"culpa" }
  ];

  function toast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    clearTimeout(window.__toast);
    window.__toast = setTimeout(()=> t.style.display="none", 1300);
  }

  async function copyText(text){
    try{
      await navigator.clipboard.writeText(text);
      toast("Copiado.");
    }catch(e){
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
      toast("Copiado.");
    }
  }

  function getHistory(){
    try{ return JSON.parse(localStorage.getItem(STORAGE_KEY_HISTORY) || "[]"); }
    catch(e){ return []; }
  }
  function setHistory(arr){
    localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(arr));
  }

  function saveLast(){
    const payload = { scenario: selectedScenario, level: selectedLevel, quickMode: quickMode };
    localStorage.setItem(STORAGE_KEY_LAST, JSON.stringify(payload));
  }
  function loadLast(){
    try{
      const p = JSON.parse(localStorage.getItem(STORAGE_KEY_LAST) || "null");
      if(!p) return;
      if(Number.isFinite(p.scenario)) selectedScenario = clamp(p.scenario, 0, scenariosFree.length-1);
      if(Number.isFinite(p.level)) selectedLevel = clamp(p.level, 0, 2);
      if(typeof p.quickMode === "boolean") quickMode = p.quickMode;
    }catch(e){}
  }
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  function openTab(t){
    tab = t;
    render();
  }

  function setNavActive(){
    ["crise","situacoes","padroes","guia"].forEach(id=>{
      const el = document.getElementById("nav-"+id);
      if(el) el.classList.toggle("active", tab===id);
    });
  }

  function renderTop(){
    document.getElementById("top").innerHTML = `
      <div class="brandRow">
        <div class="brandLeft">
          <img class="logo" src="${LOGO_FILE}" alt="Logo">
          <div class="titles">
            <h1 class="title">RADAR DE CRISE TPB</h1>
            <div class="subtitle">Dr Fabio Schmidt • Médico • CRM SP 183549</div>
          </div>
        </div>
        <button class="chipBtn" onclick="panic()">Não sei o que dizer</button>
      </div>
    `;
  }

  function intensitySeg(){
    let html = `<div class="seg">`;
    levels.forEach((lv,i)=>{
      html += `<div class="segBtn ${i===selectedLevel ? "active":""}" onclick="selectLevel(${i})">${lv.title}</div>`;
    });
    html += `</div>`;
    html += `<div class="hint" style="margin-top:10px">${levels[selectedLevel].desc}</div>`;
    return html;
  }

  function pillIntensity(){
    const lv = levels[selectedLevel];
    return `<div class="pill"><span class="dot ${lv.dot}"></span>Intensidade ativa: ${lv.title}</div>`;
  }

  function renderQuick(){
    let tiles = `<div class="grid">`;
    quickTiles.forEach((t)=>{
      tiles += `
        <div class="tile" onclick="pickQuick('${t.scenarioId}')">
          <div class="k">${t.label}</div>
          <div class="d">toque para gerar resposta</div>
          <div class="badge">crise</div>
        </div>
      `;
    });
    tiles += `</div>`;

    return `
      <div class="hero">
        <div class="heroTop">
          <div>
            <div class="heroTitle">CRISE AGORA</div>
            <div class="heroSub">Escolha o que aconteceu e copie a resposta. Objetivo: <b>reduzir dano</b> e evitar escalada.</div>
          </div>
          <div class="hint">10s</div>
        </div>

        ${tiles}

        <div class="section" style="margin-top:12px">
          <div class="sectionTitle">
            <div class="h">Intensidade</div>
            <div class="hint">isso muda a resposta</div>
          </div>
          ${intensitySeg()}
        </div>

        <div class="ctaRow">
          <button class="ctaMini" onclick="quickMode=false; saveLast(); render();">Ver modo completo</button>
          <button class="ctaMini" onclick="openTab('situacoes')">Ver situações</button>
        </div>
      </div>
    `;
  }

  function scenarioGrid(){
    let html = `<div class="grid">`;
    scenariosFree.forEach((s,i)=>{
      html += `
        <div class="tile ${i===selectedScenario ? "active":""}" onclick="selectScenario(${i})">
          <div class="k">${s.title}</div>
          <div class="d">${s.short}</div>
          <div class="badge">free</div>
        </div>
      `;
    });
    html += `</div>`;
    return html;
  }

  function renderCrise(){
    if(quickMode) return renderQuick();

    const s = scenariosFree[selectedScenario];
    const reply = s.resposta[selectedLevel];

    return `
      <div class="hero">
        <div class="heroTop">
          <div>
            <div class="heroTitle">CRISE</div>
            <div class="heroSub">Cenário + intensidade → copiar resposta. Sem debate. Frase curta regula melhor.</div>
          </div>
          <button class="chipBtn" onclick="quickMode=true; saveLast(); render();">CRISE AGORA</button>
        </div>

        <div class="section" style="margin-top:0">
          <div class="sectionTitle">
            <div class="h">1 O que aconteceu</div>
            <div class="hint">escolha o cenário</div>
          </div>
          ${scenarioGrid()}
        </div>

        <div class="section">
          <div class="sectionTitle">
            <div class="h">2 Intensidade</div>
            <div class="hint">muda a resposta</div>
          </div>
          ${intensitySeg()}
        </div>

        <div class="section">
          ${pillIntensity()}

          <div class="card bad">
            <div class="label">Frase que piora</div>
            <div class="txt">${s.piora}</div>
            <div class="subtxt">Evite “corrigir” ou “ganhar a discussão” agora.</div>
          </div>

          <div class="card info">
            <div class="label">Por que piora</div>
            <div class="txt">${s.porq}</div>
            <div class="subtxt">Quando a emoção sobe, lógica vira combustível.</div>
          </div>

          <div class="card good">
            <div class="label">Substitua por</div>
            <div class="txt">${reply}</div>
            <div class="subtxt"><b>Estrutura:</b> ${s.estrutura}</div>
          </div>

          <div class="actions">
            <button class="btn primary" onclick="copyCurrent()">Copiar resposta</button>
            <button class="btn secondary" onclick="saveCrisis()">Registrar crise</button>
            <button class="btn ghost" onclick="openScenarioModal(${selectedScenario})">Ver exemplos</button>
          </div>

          <div class="note">
            Atalho mental: <b>validar</b> → <b>clarear intenção</b> → <b>previsibilidade</b>. Em crise, menos é mais.
          </div>
        </div>
      </div>

      <div class="teaser">
        <div class="teaserTitle">O que existe na versão completa</div>
        <div class="teaserSub">Aqui você tem 5 situações. Na completa, você ganha o “motor”: mais cenários + scripts por mensagem + variações curtas e longas.</div>

        <div class="blurRow">
          <b>Modo Mensagem</b>
          <div>Ela escreveu: “Você vai sumir.” → 3 respostas prontas + 1 frase de limite + 1 frase de retorno.</div>
        </div>
        <div class="blurRow">
          <b>Mapa de escalada</b>
          <div>Se ela responder X, você faz Y. Se escalar, você pausa com previsibilidade.</div>
        </div>
      </div>
    `;
  }

  function renderSituacoes(){
    const items = scenariosFree.map((s,idx)=>`
      <div class="listItem" onclick="openScenarioModal(${idx})">
        <div style="font-weight:950; font-size:14px">${s.title}</div>
        <div style="color:var(--muted); font-size:12.5px; margin-top:6px">${s.short}</div>
        <div class="badge" style="top:12px; right:12px">toque</div>
      </div>
    `).join("");

    return `
      <div class="section">
        <div class="sectionTitle">
          <div class="h">Situações</div>
          <div class="hint">toque para ver e copiar</div>
        </div>

        <div class="hint" style="margin-bottom:10px">
          Essa lista existe para reconhecer padrões quando você estiver mais calmo. Em crise, use <b>CRISE AGORA</b>.
          <span class="kbd">copiar</span>
        </div>

        ${items}

        <div class="teaser">
          <div class="teaserTitle">Na completa, isso vira “busca por mensagem”</div>
          <div class="teaserSub">Você cola a frase dela e o Radar sugere cenário + resposta + limite. Sem você pensar.</div>
          <div class="blurRow">
            <b>Detector</b>
            <div>“Você não liga pra mim” → medo de abandono → resposta moderada pronta.</div>
          </div>
        </div>
      </div>
    `;
  }

  function renderPadroes(){
    const h = getHistory();

    let html = `
      <div class="section">
        <div class="sectionTitle">
          <div class="h">Padrões</div>
          <div class="hint">histórico local</div>
        </div>
    `;

    if(h.length===0){
      html += `
        <div class="card">
          <div class="label">Ainda vazio</div>
          <div class="txt">Sem registros ainda.</div>
          <div class="subtxt">Use <b>Registrar crise</b> após copiar a resposta. Isso ajuda você a enxergar o padrão.</div>
        </div>
      `;
    } else {
      html += h.slice(0,10).map(e=>{
        const dt = new Date(e.ts).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});
        return `
          <div class="listItem" style="cursor:default">
            <div style="font-weight:950">${e.scenario} <span style="color:var(--muted)">· ${e.level}</span></div>
            <div style="color:var(--muted); font-size:12.5px; margin-top:6px">${dt}</div>
            <div style="margin-top:10px; line-height:1.45; font-weight:800">${e.reply}</div>
          </div>
        `;
      }).join("");
    }

    html += `
        <div class="actions">
          <button class="btn secondary" onclick="copyHistory()">Copiar resumo</button>
          <button class="btn secondary" onclick="clearHistory()">Limpar histórico</button>
        </div>

        <div class="teaser">
          <div class="teaserTitle">A versão completa mostra o padrão automaticamente</div>
          <div class="teaserSub">Horário, gatilho mais comum, intensidade mais frequente e o que regula melhor.</div>
          <div class="blurRow">
            <b>Exemplo</b>
            <div>“Saídas e separações” → 62% das crises → moderada → resposta curta funciona melhor.</div>
          </div>
        </div>
      </div>
    `;

    return html;
  }

  function renderGuia(){
    return `
      <div class="section">
        <div class="sectionTitle">
          <div class="h">Guia rápido</div>
          <div class="hint">sem teoria longa</div>
        </div>

        <div class="card">
          <div class="label">Regra 1</div>
          <div class="txt">Validação vem antes de explicação.</div>
          <div class="subtxt">Se você tentar “corrigir”, vira gasolina. Primeiro regule, depois converse.</div>
        </div>

        <div class="card">
          <div class="label">Regra 2</div>
          <div class="txt">Pausa com retorno reduz abandono.</div>
          <div class="subtxt">Exemplo: “Pausa 10 minutos. Eu volto. Eu não vou sumir.”</div>
        </div>

        <div class="card">
          <div class="label">Regra 3</div>
          <div class="txt">Tom crítico quebra qualquer frase.</div>
          <div class="subtxt">Curto + neutro + previsível.</div>
        </div>

        <div class="card">
          <div class="label">Emergência</div>
          <div class="txt">Em risco imediato, procure emergência.</div>
          <div class="subtxt">Brasil: CVV 188. Este material é educativo.</div>
        </div>

        <div class="teaser">
          <div class="teaserTitle">Na completa, existe “treino de 2 minutos”</div>
          <div class="teaserSub">Você pratica respostas fora da crise para usar melhor na hora.</div>
          <div class="blurRow">
            <b>Treino</b>
            <div>Você escolhe uma mensagem e treina a frase curta + limite + retorno.</div>
          </div>
        </div>
      </div>
    `;
  }

  function render(){
    renderTop();
    setNavActive();
    const app = document.getElementById("app");
    if(tab==="crise") app.innerHTML = renderCrise();
    if(tab==="situacoes") app.innerHTML = renderSituacoes();
    if(tab==="padroes") app.innerHTML = renderPadroes();
    if(tab==="guia") app.innerHTML = renderGuia();
    saveLast();
  }

  function selectScenario(i){
    selectedScenario = i;
    render();
  }

  function selectLevel(i){
    selectedLevel = Number(i);
    render();
    toast("Intensidade: " + levels[selectedLevel].title);
  }

  function findScenarioIndexById(id){
    return scenariosFree.findIndex(s => s.id === id);
  }

  function pickQuick(scenarioId){
    const idx = findScenarioIndexById(scenarioId);
    if(idx >= 0){
      selectedScenario = idx;
      quickMode = false; // após escolher, já vai direto ao motor completo e mostra os cards
      tab = "crise";
      render();
      copyCurrent(); // ação de crise: copiar imediatamente
    }
  }

  function copyCurrent(){
    const s = scenariosFree[selectedScenario];
    copyText(s.resposta[selectedLevel]);
  }

  function panic(){
    // 1 frase universal (curta + limite + retorno)
    copyText("Eu entendo que isso te machucou. Pausa agora. Eu volto em 10 minutos e a gente conversa com calma.");
  }

  function saveCrisis(){
    const s = scenariosFree[selectedScenario];
    const entry = {
      ts: new Date().toISOString(),
      scenario: s.title,
      level: levels[selectedLevel].title,
      reply: s.resposta[selectedLevel]
    };
    const h = getHistory();
    h.unshift(entry);
    setHistory(h);
    toast("Registrado.");
  }

  function clearHistory(){
    if(!confirm("Limpar todo o histórico deste aparelho?")) return;
    setHistory([]);
    render();
    toast("Limpo.");
  }

  function copyHistory(){
    const h = getHistory();
    if(!h.length){ toast("Sem histórico."); return; }
    const lines = [];
    lines.push("RADAR DE CRISE TPB — RESUMO");
    lines.push("Dr Fabio Schmidt • CRM SP 183549");
    lines.push("");
    h.slice(0,12).forEach((e,idx)=>{
      const dt = new Date(e.ts).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});
      lines.push(`#${idx+1} ${dt} — ${e.scenario} (${e.level})`);
      lines.push(`Resposta: ${e.reply}`);
      lines.push("");
    });
    copyText(lines.join("\n"));
  }

  // Modal (para situações / exemplos)
  function openScenarioModal(idx){
    const s = scenariosFree[idx];

    const triggers = s.triggers.map(t => `<div class="card" style="margin-top:10px"><div class="label">Como aparece</div><div class="txt">${t}</div></div>`).join("");

    document.getElementById("modalTitle").textContent = s.title;
    document.getElementById("modalSub").textContent = "Exemplos reais + resposta por intensidade (usa a intensidade ativa)";
    document.getElementById("modalBody").innerHTML = `
      <div class="pill" style="margin-bottom:10px">
        <span class="dot ${levels[selectedLevel].dot}"></span>
        Intensidade ativa: ${levels[selectedLevel].title}
      </div>

      ${triggers}

      <div class="card bad">
        <div class="label">Erro que piora</div>
        <div class="txt">${s.piora}</div>
        <div class="subtxt">O erro comum é tentar “corrigir” ou “provar”.</div>
      </div>

      <div class="card good">
        <div class="label">Resposta recomendada</div>
        <div class="txt">${s.resposta[selectedLevel]}</div>
        <div class="subtxt"><b>Estrutura:</b> ${s.estrutura}</div>
      </div>

      <div class="actions">
        <button class="btn primary" onclick="copyText(scenariosFree[${idx}].resposta[selectedLevel])">Copiar resposta</button>
        <button class="btn secondary" onclick="goToCrise(${idx})">Abrir no modo Crise</button>
      </div>

      <div class="teaser" style="margin-top:14px">
        <div class="teaserTitle">Na versão completa</div>
        <div class="teaserSub">Você teria <b>3 variações</b> (curta, média, longa) e um “se ela responder X…” para seguir sem pensar.</div>
        <div class="blurRow">
          <b>Curta</b>
          <div>Valida + previsibilidade em 1 frase.</div>
        </div>
        <div class="blurRow">
          <b>Longa</b>
          <div>Valida + limite + retorno + reparo (sem escalar).</div>
        </div>
      </div>
    `;
    showModal();
  }

  function goToCrise(idx){
    selectedScenario = idx;
    hideModal();
    tab = "crise";
    quickMode = false;
    render();
  }

  function showModal(){
    document.getElementById("modalBackdrop").style.display = "flex";
  }
  function hideModal(){
    document.getElementById("modalBackdrop").style.display = "none";
  }
  function closeModal(e){
    if(e.target.id === "modalBackdrop") hideModal();
  }

  // init
  loadLast();
  render();
</script>

</body>
</html>
