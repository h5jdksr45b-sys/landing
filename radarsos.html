<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RADAR DE CRISE TPB</title>

  <style>
    :root{
      --bg:#0b0f16;
      --surface: rgba(16,20,28,.74);
      --surface2: rgba(255,255,255,.045);
      --text:#eef2ff;
      --muted:#a7b2cc;
      --line: rgba(255,255,255,.10);
      --accent:#66e0a6;
      --warn:#f1b46b;
      --danger:#ff6b6b;
      --info:#7aa7ff;
      --shadow: 0 22px 70px rgba(0,0,0,.52);
      --radius:18px;
      --max: 920px;
      --sans: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(980px 560px at 18% -8%, rgba(102,224,166,.15), transparent 62%),
        radial-gradient(900px 480px at 86% -8%, rgba(241,180,107,.13), transparent 66%),
        radial-gradient(1020px 880px at 50% 120%, rgba(102,224,166,.11), transparent 72%),
        var(--bg);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      padding-bottom: 92px;
    }

    .wrap{ max-width: var(--max); margin: 0 auto; padding: 14px 14px 28px; }
    .shell{
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(16,20,28,.72), rgba(16,20,28,.88));
      box-shadow: var(--shadow);
      border-radius: 26px;
      overflow:hidden;
    }

    .top{
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.05), transparent);
    }

    .brandRow{ display:flex; gap:12px; align-items:center; justify-content:space-between; }
    .brandLeft{ display:flex; align-items:center; gap:12px; min-width:0; }

    .logo{
      width:44px; height:44px; border-radius:14px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
      object-fit: cover; flex:0 0 auto;
    }

    .titles{ min-width:0; }
    .title{
      font-size: 30px; font-weight: 950; letter-spacing: .2px; line-height: 1.05;
      margin:0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .subtitle{
      margin-top: 6px; color: var(--muted); font-size: 13px; line-height: 1.35;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .chipBtn{
      border:1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 12px;
      font-weight: 900;
      font-size: 13px;
      cursor:pointer;
      user-select:none;
      white-space: nowrap;
    }
    .chipBtn:active{ transform: translateY(1px); }

    .content{ padding: 16px; }

    .section{ margin-top: 16px; }
    .sectionTitle{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; margin-bottom: 10px;
    }
    .sectionTitle .h{ font-weight: 950; font-size: 14px; letter-spacing: .2px; }
    .hint{ color: var(--muted); font-size: 12.5px; line-height: 1.35; }

    .hero{
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(102,224,166,.14), rgba(255,255,255,.02));
      border-radius: 22px;
      padding: 14px;
    }
    .heroTop{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom: 10px; }
    .heroTitle{ font-weight: 950; font-size: 14px; letter-spacing: .2px; }
    .heroSub{ color: var(--muted); font-size: 12.5px; line-height: 1.35; margin-top: 6px; }

    .bigCTA{
      width:100%;
      border:none;
      border-radius: 18px;
      padding: 16px 14px;
      font-weight: 950;
      font-size: 15px;
      cursor:pointer;
      user-select:none;
      background: var(--accent);
      color:#06110c;
    }
    .bigCTA:active{ transform: translateY(1px); }

    .ctaRow{ display:flex; gap:10px; flex-wrap:wrap; margin-top: 10px; }
    .ctaMini{
      border:1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 12px;
      font-weight: 900;
      font-size: 13px;
      cursor:pointer;
      user-select:none;
      flex: 1 1 180px;
    }
    .ctaMini:active{ transform: translateY(1px); }
    .ctaMini.primary{
      border-color: rgba(102,224,166,.55);
      background: rgba(102,224,166,.12);
      color: var(--text);
    }

    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 520px){
      .grid{ grid-template-columns: 1fr; }
      .title{ font-size: 28px; }
    }

    .tile{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      border-radius: var(--radius);
      padding: 12px 12px;
      cursor:pointer;
      user-select:none;
      transition: transform .08s ease;
      position: relative;
      overflow:hidden;
    }
    .tile:active{ transform: translateY(1px); }
    .tile.active{
      border-color: rgba(102,224,166,.55);
      background: linear-gradient(180deg, rgba(102,224,166,.14), rgba(255,255,255,.02));
    }
    .tile .k{ font-weight: 950; font-size: 13.5px; line-height: 1.2; }
    .tile .d{ margin-top: 6px; color: var(--muted); font-size: 12.5px; line-height: 1.35; }

    .badge{
      position:absolute;
      top:10px; right:10px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.20);
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 950;
      font-size: 11px;
      color: var(--muted);
      backdrop-filter: blur(8px);
      pointer-events:none;
    }

    .seg{
      display:flex;
      gap:8px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--line);
      padding: 8px;
      border-radius: 16px;
    }
    .segBtn{
      flex:1;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      border-radius: 12px;
      padding: 12px 10px;
      font-weight: 950;
      font-size: 13px;
      cursor:pointer;
      user-select:none;
      text-align:center;
    }
    .segBtn.active{
      color: var(--text);
      border-color: rgba(102,224,166,.55);
      background: rgba(102,224,166,.12);
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
      padding: 10px 12px;
      border-radius: 999px;
      font-weight: 950;
      font-size: 12.5px;
      color: var(--text);
      margin-top: 2px;
    }
    .dot{
      width:9px; height:9px; border-radius: 99px;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(102,224,166,.10);
    }
    .dot.mod{ background: var(--warn); box-shadow: 0 0 0 4px rgba(241,180,107,.10); }
    .dot.grv{ background: var(--danger); box-shadow: 0 0 0 4px rgba(255,107,107,.10); }

    .card{
      border: 1px solid var(--line);
      background: rgba(0,0,0,.16);
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 10px;
      backdrop-filter: blur(8px);
    }
    .label{
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 950;
    }
    .txt{
      margin-top: 8px;
      font-size: 15px;
      line-height: 1.45;
      font-weight: 900;
    }
    .subtxt{
      margin-top: 8px;
      color: rgba(238,242,255,.84);
      font-size: 13px;
      line-height: 1.45;
      font-weight: 650;
    }

    .card.bad{ border-color: rgba(255,107,107,.55); background: rgba(255,107,107,.10); }
    .card.info{ border-color: rgba(122,167,255,.55); background: rgba(122,167,255,.10); }
    .card.good{ border-color: rgba(102,224,166,.55); background: rgba(102,224,166,.10); }

    .actions{ display:flex; gap:10px; flex-wrap:wrap; margin-top: 12px; }
    .btn{
      border:none;
      border-radius: 14px;
      padding: 14px 14px;
      font-weight: 950;
      font-size: 14px;
      cursor:pointer;
      user-select:none;
      flex: 1 1 160px;
    }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{ background: var(--accent); color:#06110c; }
    .btn.secondary{ background: rgba(255,255,255,.05); color: var(--text); border: 1px solid var(--line); }
    .btn.ghost{ background: transparent; color: var(--muted); border: 1px dashed rgba(255,255,255,.16); }

    .note{ margin-top: 10px; color: var(--muted); font-size: 12.5px; line-height: 1.35; }

    .listItem{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 10px;
      cursor:pointer;
      user-select:none;
      position: relative;
      overflow:hidden;
    }
    .listItem:active{ transform: translateY(1px); }

    .lock{ margin-top: 14px; color: var(--muted); font-size: 13px; line-height: 1.4; }

    .teaser{
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(241,180,107,.12), rgba(255,255,255,.02));
      border-radius: 18px;
      padding: 14px;
      margin-top: 14px;
      position: relative;
      overflow:hidden;
    }
    .teaserTitle{ font-weight: 950; font-size: 13.5px; margin-bottom: 6px; }
    .teaserSub{ color: var(--muted); font-size: 12.5px; line-height: 1.35; }

    .blurRow{
      margin-top: 12px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      border-radius: 14px;
      padding: 12px;
      filter: blur(1.7px);
      opacity: .62;
      user-select:none;
    }
    .blurRow b{ font-size: 12.5px; }
    .blurRow div{ color: var(--muted); margin-top: 6px; font-size: 12.5px; }

    .bottom{
      position: fixed;
      left:0; right:0; bottom:0;
      background: rgba(11,15,22,.88);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(12px);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      z-index: 50;
    }
    .bottomInner{
      max-width: var(--max);
      margin: 0 auto;
      display:flex;
      justify-content: space-between;
      gap: 8px;
    }
    .nav{
      flex:1;
      text-align:center;
      border: 1px solid transparent;
      border-radius: 14px;
      padding: 10px 8px;
      color: var(--muted);
      cursor:pointer;
      user-select:none;
      font-weight: 950;
      font-size: 12px;
      line-height: 1.2;
    }
    .nav .ico{ font-size: 16px; display:block; margin-bottom: 4px; }
    .nav.active{
      color: var(--accent);
      border-color: rgba(102,224,166,.35);
      background: rgba(102,224,166,.08);
    }

    .toast{
      position: fixed;
      left:50%;
      bottom: 96px;
      transform: translateX(-50%);
      background: rgba(11,15,22,.92);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 950;
      font-size: 13px;
      display:none;
      z-index: 60;
      box-shadow: var(--shadow);
    }

    /* Modal */
    .modalBackdrop{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.56);
      backdrop-filter: blur(6px);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index: 80;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
    }
    .modal{
      width: min(920px, 100%);
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(16,20,28,.92), rgba(16,20,28,.98));
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .modalTop{
      padding: 14px 14px 12px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }
    .modalTitle{ font-weight:950; font-size:16px; line-height:1.2; }
    .modalSub{ color: var(--muted); font-size:12.5px; margin-top:6px; line-height:1.35; }
    .xbtn{
      border:1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 10px;
      font-weight: 950;
      cursor:pointer;
      user-select:none;
      white-space: nowrap;
    }
    .modalBody{ padding: 14px; }

    /* Inputs */
    .inputWrap{
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.16);
      border-radius: 16px;
      padding: 12px;
    }
    textarea{
      width:100%;
      border:none;
      outline:none;
      background: transparent;
      color: var(--text);
      resize:none;
      font-family: var(--sans);
      font-weight: 800;
      font-size: 14px;
      line-height: 1.35;
      min-height: 64px;
    }
    textarea::placeholder{ color: rgba(167,178,204,.70); font-weight: 800; }

    /* Toggle */
    .toggleRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top: 10px;
      padding-top: 10px;
      border-top:1px solid rgba(255,255,255,.08);
    }
    .switch{
      position:relative;
      width:50px;
      height:30px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      cursor:pointer;
      user-select:none;
      flex:0 0 auto;
    }
    .knob{
      position:absolute;
      top:3px;
      left:3px;
      width:24px;
      height:24px;
      border-radius: 999px;
      background: rgba(255,255,255,.85);
      transition: transform .14s ease;
    }
    .switch.on{
      border-color: rgba(102,224,166,.45);
      background: rgba(102,224,166,.14);
    }
    .switch.on .knob{ transform: translateX(20px); background: rgba(102,224,166,.95); }

    /* Tiny chips */
    .chips{
      display:flex; gap:8px; flex-wrap:wrap; margin-top: 10px;
    }
    .chip{
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      border-radius: 999px;
      padding: 8px 10px;
      font-weight: 950;
      font-size: 12px;
      color: var(--muted);
      cursor:pointer;
      user-select:none;
    }
    .chip:active{ transform: translateY(1px); }

    /* Feedback */
    .fbRow{
      display:flex; gap:10px; flex-wrap:wrap;
      margin-top: 10px;
      align-items:center;
    }
    .fbBtn{
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 12px;
      font-weight: 950;
      font-size: 13px;
      cursor:pointer;
      user-select:none;
      flex: 1 1 160px;
      text-align:center;
    }
    .fbBtn.good{
      border-color: rgba(102,224,166,.35);
      background: rgba(102,224,166,.10);
    }
    .fbBtn.bad{
      border-color: rgba(255,107,107,.35);
      background: rgba(255,107,107,.10);
    }

    /* Onboarding */
    .onbSteps{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
      margin-top: 12px;
    }
    .step{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.14);
      border-radius: 16px;
      padding: 12px;
    }
    .step b{ display:block; font-size: 13px; }
    .step div{ margin-top: 6px; color: var(--muted); font-size: 12.5px; line-height: 1.35; }

  </style>
</head>

  <div class="bottom">

      <div class="modalBody" id="modalBody"></div>
    </div>

  function toast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    clearTimeout(window.__toast);
    window.__toast = setTimeout(()=> t.style.display="none", 1400);

  async function copyText(text){
    try{
      await navigator.clipboard.writeText(text);
      toast("Copiado.");
    }catch(e){
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
      toast("Copiado.");
    }
  }

    const s = scenariosFree[selectedScenario];
    const entry = {

      scenario: s.title,
      scenarioId: s.id,
      level: levels[selectedLevel].title,

    setHistory([]);
    toast("Histórico limpo.");

  function copyHistory(){
    const h = getHistory();
    if(!h.length){ toast("Sem histórico."); return; }
    const lines = [];
    lines.push("RADAR DE CRISE TPB — RESUMO");
    lines.push("Dr Fabio Schmidt • CRM SP 183549");
    lines.push("");
    h.slice(0,14).forEach((e,idx)=>{
      const dt = new Date(e.ts).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});
      lines.push(`#${idx+1} ${dt} — ${e.scenario} (${e.level})`);
      lines.push(`Resposta: ${e.reply}`);
      lines.push("");
    });
    copyText(lines.join("\n"));

    const s = scenariosFree[selectedScenario];
    const favs = getFavs();
    const existsIdx = favs.findIndex(f => f.scenarioId === s.id && f.levelIdx === selectedLevel);
    if(existsIdx >= 0){
      favs.splice(existsIdx, 1);
      setFavs(favs);
      toast("Removido dos favoritos.");

      favs.unshift({
        id: cryptoId(),
        ts: new Date().toISOString(),
        scenario: s.title,
        scenarioId: s.id,
        level: levels[selectedLevel].title,
        levelIdx: selectedLevel,
        reply: s.resposta[selectedLevel]

      setFavs(favs);
      toast("Favoritado ⭐");
    }
    render();
  }

  function pasteExample(text){

  function normalize(str){
    return (str || "")
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9\s]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function scoreScenarioForText(scenario, text){
    const t = normalize(text);
    let score = 0;
    for(const kw of (scenario.keywords || [])){
      const k = normalize(kw);
      if(!k) continue;
      if(t.includes(k)) score += 3;
      else{
        const parts = k.split(" ").filter(Boolean);
        if(parts.length >= 2){
          let hit = 0;
          for(const p of parts) if(t.includes(p)) hit++;
          if(hit >= 2) score += 2;
          else if(hit === 1) score += 1;
        } else if(parts.length === 1 && t.includes(parts[0])) score += 1;
      }
    }
    // bônus por triggers aproximados
    for(const tr of (scenario.triggers || [])){
      const trn = normalize(tr);
      if(trn && trn.length >= 8 && t.includes(trn.slice(0, Math.min(14, trn.length)))) score += 1;
    }
    return score;
  }

  function suggestFromMessage(){
    const el = document.getElementById("msgInput");
    const out = document.getElementById("msgResult");
    if(!el || !out) return;

    const text = el.value || "";
    if(normalize(text).length < 4){
      out.style.display = "block";
      out.innerHTML = `<b>Dica:</b> cole uma frase mais completa.`;
      return;
    }

    let bestIdx = 0;
    let bestScore = -1;
    scenariosFree.forEach((s, idx)=>{
      const sc = scoreScenarioForText(s, text);
      if(sc > bestScore){ bestScore = sc; bestIdx = idx; }
    });

    const chosen = scenariosFree[bestIdx];
    selectedScenario = bestIdx;

    const m = getMetrics();
    m.msg_mode_uses += 1;
    setMetrics(m);

    out.style.display = "block";
    out.innerHTML = `
      <b>Sugestão:</b> ${chosen.title}<br>
      <span style="color:var(--muted)">Se não parecer certo, escolha manualmente em “O que aconteceu”.</span>
    `;
    render();
  }

  function suggestAndCopy(){
    suggestFromMessage();
    copyCurrent();
  }

  // ====== MODAL ======
  function openScenarioModal(idx){
    const s = scenariosFree[idx];
    const triggers = (s.triggers || []).map(t => `
      <div class="card" style="margin-top:10px">
        <div class="label">Como aparece</div>
        <div class="txt">${t}</div>
      </div>
    `).join("");

    document.getElementById("modalTitle").textContent = s.title;
    document.getElementById("modalSub").textContent = "Exemplos reais + resposta por intensidade (usa a intensidade ativa)";
    document.getElementById("modalBody").innerHTML = `
      <div class="pill" style="margin-bottom:10px">
        <span class="dot ${levels[selectedLevel].dot}"></span>
        Intensidade ativa: ${levels[selectedLevel].title}
      </div>

      ${triggers}

      <div class="card bad">
        <div class="label">Erro que piora</div>
        <div class="txt">${s.piora}</div>
        <div class="subtxt">O erro comum é tentar “corrigir” ou “provar” na hora errada.</div>
      </div>

      <div class="card good">
        <div class="label">Resposta recomendada</div>
        <div class="txt">${s.resposta[selectedLevel]}</div>
        <div class="subtxt"><b>Estrutura:</b> ${s.estrutura}</div>
      </div>

      <div class="actions">
        <button class="btn primary" onclick="copyText(scenariosFree[${idx}].resposta[selectedLevel])">Copiar resposta</button>
        <button class="btn secondary" onclick="goToCrise(${idx})">Abrir no modo Crise</button>
      </div>

      <div class="teaser" style="margin-top:14px">
        <div class="teaserTitle">Versão completa</div>
        <div class="teaserSub">Você teria variações <b>curta</b>, <b>média</b>, <b>limite</b> + “se ela responder X…”</div>
        <div class="ctaRow" style="margin-top:12px">
          <button class="ctaMini primary" onclick="waitlistClick()">Quero entrar na lista</button>
          <button class="ctaMini" onclick="hideModal()">Voltar</button>
        </div>
      </div>
    `;
    showModal();
  }

  function goToCrise(idx){
    selectedScenario = idx;
    hideModal();
    tab = "crise";
    quickMode = false;
    render();
  }

  function showModal(){
    document.getElementById("modalBackdrop").style.display = "flex";
  }
  function hideModal(){
    document.getElementById("modalBackdrop").style.display = "none";
  }
  function closeModal(e){
    if(e.target.id === "modalBackdrop") hideModal();
  }

  // ====== SHARE ======
  async function shareApp(){
    const text = "RADAR DE CRISE TPB (free) — frases rápidas para reduzir escalada em momentos de crise.";
    const url = location.href;
    try{
      if(navigator.share){
        await navigator.share({ title: "RADAR DE CRISE TPB", text, url });
        toast("Compartilhado.");
      } else {
        await copyText(url);
        toast("Link copiado.");
      }
    }catch(e){
      try{ await copyText(url); }catch(_){}
      toast("Link copiado.");
    }
  }

  // ====== ONBOARDING ======
  function onboardingDone(){
    return localStorage.getItem(STORAGE_KEY_ONB) === "1";
  }
  function markOnboardingDone(){
    localStorage.setItem(STORAGE_KEY_ONB, "1");
  }

  function maybeShowOnboarding(){
    if(onboardingDone()) return;
    document.getElementById("modalTitle").textContent = "Como usar (30 segundos)";
    document.getElementById("modalSub").textContent = "Objetivo: reduzir escalada — sem discutir fatos agora.";
    document.getElementById("modalBody").innerHTML = `
      <div class="onbSteps">
        <div class="step">
          <b>1) Use CRISE AGORA</b>
          <div>Escolha o que aconteceu e copie a resposta em 10s.</div>
        </div>
        <div class="step">
          <b>2) Ajuste a intensidade</b>
          <div>Leve / Moderada / Grave muda o tipo de frase.</div>
        </div>
        <div class="step">
          <b>3) Favoritos</b>
          <div>Quando algo funcionar, salve ⭐ para usar mais rápido depois.</div>
        </div>
        <div class="step">
          <b>4) Lista do completo</b>
          <div>Se quiser o motor completo, entre na lista no WhatsApp.</div>
        </div>
      </div>

      <div class="ctaRow" style="margin-top:14px">
        <button class="ctaMini primary" onclick="markOnboardingDone(); hideModal();">Entendi</button>
        <button class="ctaMini" onclick="waitlistClick()">Quero a versão completa</button>
      </div>
    `;
    showModal();
  }

  // ====== CRYPTO ID FALLBACK ======
  function cryptoId(){
    try{
      if(crypto && crypto.randomUUID) return crypto.randomUUID();
    }catch(e){}
    return "id_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16);
  }

  // ====== RENDER ======
  function render(){
    renderTop();
    setNavActive();
    const app = document.getElementById("app");
    if(tab==="crise") app.innerHTML = renderCrise();
    if(tab==="situacoes") app.innerHTML = renderSituacoes();
    if(tab==="padroes") app.innerHTML = renderPadroes();
    if(tab==="mais") app.innerHTML = renderMais();
    saveLast();
  }

  // ====== INIT ======
  loadLast();
  render();
  // onboarding apenas na primeira vez
  setTimeout(maybeShowOnboarding, 250);
</script>
