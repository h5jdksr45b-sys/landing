<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Radar de Crise</title>

<style>

body{

margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
color:#fff;

background-color:#0f1115;

background-image:
radial-gradient(900px 500px at 15% -5%, rgba(100,214,160,.12), transparent 60%),
radial-gradient(700px 400px at 85% -5%, rgba(242,182,108,.10), transparent 65%),
radial-gradient(900px 700px at 50% 120%, rgba(100,214,160,.08), transparent 70%);

}

.container{

max-width:720px;
margin:auto;
padding:24px;
padding-bottom:120px;

background:rgba(15,17,21,.94);
border-radius:26px;

}

h1{

margin:0;
font-size:24px;

}

.subtitle{

color:#aab3c5;
font-size:13px;
margin-bottom:24px;

}

.section{

margin-top:26px;

}

.chips{

display:flex;
flex-wrap:wrap;
gap:10px;

}

.chip{

padding:12px 14px;
border-radius:999px;
border:1px solid rgba(255,255,255,.08);
cursor:pointer;

}

.chip.active{

background:#64d6a020;
border-color:#64d6a0;

}

.level{

border:1px solid rgba(255,255,255,.08);
padding:14px;
border-radius:14px;
margin-top:10px;
cursor:pointer;

}

.level.active{

border-color:#64d6a0;
background:#64d6a015;

}

.box{

border-radius:14px;
padding:18px;
margin-top:14px;

border:1px solid rgba(255,255,255,.08);

}

.bad{

border-color:#ff6b6b;
background:#ff6b6b12;

}

.good{

border-color:#64d6a0;
background:#64d6a012;

}

.info{

border-color:#6ea8ff;
background:#6ea8ff12;

}

button{

margin-top:16px;
padding:14px;
border-radius:12px;
border:none;

background:#64d6a0;
color:#000;

font-weight:600;
cursor:pointer;

}

.secondary{

background:#222;
color:#fff;

}

.bottom{

position:fixed;
bottom:0;
left:0;
right:0;

background:#0f1115;
border-top:1px solid rgba(255,255,255,.08);

display:flex;
justify-content:space-around;
padding:12px;

}

.nav{

color:#aaa;
cursor:pointer;

}

.nav.active{

color:#64d6a0;

}

.lock{

margin-top:20px;
color:#999;
font-size:14px;

}

.history{

margin-top:20px;
font-size:13px;
color:#bbb;

}

</style>

</head>

<body>

<div class="container" id="app"></div>

<div class="bottom">

<div class="nav active" onclick="openTab('crise')">🚨</div>

<div class="nav" onclick="openTab('biblioteca')">📚</div>

<div class="nav" onclick="openTab('padroes')">📊</div>

<div class="nav" onclick="openTab('guia')">⚙️</div>

</div>

<script>

let tab="crise"

let selectedScenario=0
let selectedLevel=0

const scenarios=[

{
title:"Medo de abandono",
piora:"Você está paranoico.",
porq:"Invalida a experiência emocional.",
resposta:"Entendo que isso te deixou inseguro. Vamos conversar com calma."
},

{
title:"Raiva explosiva",
piora:"Você está exagerando.",
porq:"Minimiza emoção intensa.",
resposta:"Eu vejo que a raiva está forte agora."
},

{
title:"Acusação injusta",
piora:"Isso é coisa da sua cabeça.",
porq:"Parece gaslighting para quem está em crise.",
resposta:"Eu vejo que isso te feriu."
},

{
title:"Culpa extrema",
piora:"Para de se culpar.",
porq:"Ignora o peso emocional.",
resposta:"Teve impacto, mas isso não define quem você é."
},

{
title:"Crise após melhora",
piora:"Mas você estava bem ontem.",
porq:"Aumenta frustração.",
resposta:"Isso é um episódio, não uma recaída."
}

]

function openTab(t){

tab=t

render()

}

function render(){

let html=""

if(tab=="crise"){

html+=`
<h1>RADAR DE CRISE</h1>

<div class="subtitle">
Dr Fabio Schmidt • CRM-SP 183549
</div>

<div class="section">

<b>1 — O que está acontecendo?</b>

<div class="chips">
`

scenarios.forEach((s,i)=>{

html+=`
<div class="chip ${i==selectedScenario?"active":""}"
onclick="selectScenario(${i})">

${s.title}

</div>
`

})

html+=`
</div>
</div>

<div class="section">

<b>2 — Intensidade da crise</b>

`

const levels=["Leve","Moderada","Grave"]

levels.forEach((l,i)=>{

html+=`
<div class="level ${i==selectedLevel?"active":""}"
onclick="selectLevel(${i})">

${l}

</div>
`

})

html+=`</div>`

if(selectedLevel!=null){

let s=scenarios[selectedScenario]

html+=`

<div class="box bad">

<b>Frase que piora</b><br>
${s.piora}

</div>

<div class="box info">

<b>Por que piora</b><br>
${s.porq}

</div>

<div class="box good">

<b>Substitua por</b><br>
${s.resposta}

</div>

<button onclick="copy()">Copiar resposta</button>

<button class="secondary" onclick="save()">Registrar crise</button>

`

}

}

if(tab=="biblioteca"){

html+=`

<h1>Biblioteca</h1>

<div class="subtitle">
Cenários disponíveis no Radar FREE
</div>

`

scenarios.forEach(s=>{

html+=`<div class="box">${s.title}</div>`

})

html+=`

<div class="lock">

Mais cenários disponíveis no Radar completo.

</div>

`

}

if(tab=="padroes"){

html+=`

<h1>Padrões</h1>

<div class="lock">

Disponível na versão completa do Radar.

</div>

`

}

if(tab=="guia"){

html+=`

<h1>Guia rápido</h1>

<div class="box">

<b>Regra 1</b><br>
Validar emoção antes de explicar.

</div>

<div class="box">

<b>Regra 2</b><br>
Evitar frases que minimizam sentimento.

</div>

<div class="box">

<b>Regra 3</b><br>
Se a emoção subir, pausar conversa.

</div>

`

}

document.getElementById("app").innerHTML=html

}

function selectScenario(i){

selectedScenario=i
render()

}

function selectLevel(i){

selectedLevel=i
render()

}

function copy(){

navigator.clipboard.writeText(
scenarios[selectedScenario].resposta
)

alert("Resposta copiada")

}

function save(){

let h=localStorage.getItem("crises") || ""

h+=scenarios[selectedScenario].title+" | "

localStorage.setItem("crises",h)

alert("Crise registrada")

}

render()

</script>

</body>

</html>
