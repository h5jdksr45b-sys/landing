<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Fábio Schmidt — Arsenal Master</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#070b14;--surface:#0f1523;--surface-2:#151d2e;--border:#1e2d4a;
--accent:#3b82f6;--success:#10b981;--white:#f1f5f9;--muted:#7a8ba8;
--text:#c9d5e3;--gold:#f59e0b;--purple:#8b5cf6;--red:#ef4444;--cyan:#06b6d4;
}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 15% 0%,rgba(59,130,246,.07),transparent 55%),radial-gradient(ellipse at 85% 100%,rgba(139,92,246,.05),transparent 55%)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.header{position:sticky;top:0;z-index:100;background:rgba(7,11,20,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:18px 20px}
.header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;gap:14px}
.logo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:800;flex-shrink:0;box-shadow:0 3px 15px rgba(59,130,246,.3)}
.logo-text h1{font-size:17px;font-weight:700;color:var(--white)}
.logo-text span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-weight:600}

.main{max-width:720px;margin:0 auto;padding:28px 16px 100px;position:relative;z-index:1}

.sdiv{display:flex;align-items:center;gap:12px;margin:32px 0 14px;padding:0 4px}
.sdiv:first-child{margin-top:0}
.sdiv .ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sdiv .lbl{font-size:14px;font-weight:700;color:var(--white)}
.sdiv .sub{font-size:11px;color:var(--muted);font-weight:400;display:block;margin-top:1px}
.sdiv .line{flex:1;height:1px;background:var(--border)}
.tb .ico{background:rgba(59,130,246,.12);color:var(--accent)}
.tg .ico{background:rgba(16,185,129,.12);color:var(--success)}
.tp .ico{background:rgba(139,92,246,.12);color:var(--purple)}
.to .ico{background:rgba(245,158,11,.12);color:var(--gold)}
.tr .ico{background:rgba(239,68,68,.12);color:var(--red)}
.tc .ico{background:rgba(6,182,212,.12);color:var(--cyan)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden;transition:all .25s cubic-bezier(.4,0,.2,1)}
.card:hover{border-color:rgba(59,130,246,.25);transform:translateY(-2px);box-shadow:0 6px 30px rgba(0,0,0,.35)}
.card:active{transform:translateY(0)}
.card-h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.card-t{font-size:13px;font-weight:700;color:var(--white);display:flex;align-items:center;gap:8px}
.bg{font-size:8px;text-transform:uppercase;letter-spacing:.8px;padding:3px 8px;border-radius:5px;font-weight:700}
.bs{background:rgba(59,130,246,.13);color:#60a5fa}
.bp{background:rgba(139,92,246,.13);color:#a78bfa}
.bl{background:rgba(16,185,129,.13);color:#6ee7b7}
.cl{font-size:11px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:5px;flex-shrink:0;transition:all .25s ease}
.cl svg{width:14px;height:14px}
.card.ok .cl{color:var(--success)}
.card.ok{border-color:rgba(16,185,129,.35)}
.card-tx{font-size:12.5px;color:var(--muted);line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:72px;overflow:hidden;mask-image:linear-gradient(to bottom,#000 50%,transparent 100%);-webkit-mask-image:linear-gradient(to bottom,#000 50%,transparent 100%);pointer-events:none}

.tw{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none}
.toast{background:var(--surface-2);border:1px solid var(--success);color:var(--white);padding:12px 22px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 40px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;opacity:0;transform:translateY(20px);transition:all .3s cubic-bezier(.4,0,.2,1)}
.toast.show{opacity:1;transform:translateY(0)}
.toast svg{color:var(--success);width:16px;height:16px;flex-shrink:0}

.fab{position:fixed;bottom:24px;right:24px;z-index:100;width:44px;height:44px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s ease;box-shadow:0 4px 20px rgba(0,0,0,.3);opacity:0;pointer-events:none}
.fab.v{opacity:1;pointer-events:auto}
.fab:hover{color:var(--white);border-color:var(--accent);transform:translateY(-2px)}

@media(max-width:600px){.header{padding:14px 16px}.main{padding:20px 12px 100px}.card{padding:15px}}
</style>
</head>
<body>

<header class="header"><div class="header-inner">
<div class="logo-icon">FS</div>
<div class="logo-text"><h1>Arsenal Master</h1><span>Dr. Fábio Schmidt</span></div>
</div></header>

<main class="main" id="app"></main>

<div class="tw"><div class="toast" id="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg><span id="tm">Copiado!</span></div></div>

<button class="fab" id="fab" onclick="window.scrollTo({top:0})"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 15l-6-6-6 6"/></svg></button>

<script>
var S=[
{t:"Consultas e Agendamentos",i:"🩺",th:"tb",s:"Converter interessados no Direct / WhatsApp",c:[
{t:"Agendamento Elegante (1ª Consulta)",b:"SCRIPT",bc:"bs",x:"Para garantir a atenção e o cuidado que o seu caso exige, disponibilizo minha agenda digital onde você pode escolher o dia e horário que melhor se adequam à sua rotina. O valor da primeira consulta é de R$ 700,00 e as seguintes R$ 650,00. Aguardo você para iniciarmos esse processo.\n\nLink para agendamento: https://cal.com/drfabioschmidt"},
{t:"Valor Social (Lista de Espera)",b:"SCRIPT",bc:"bs",x:"No momento, minhas vagas para atendimento social estão preenchidas. No entanto, mantenho uma lista de espera para atendimentos com 50% de redução no valor (R$ 350,00). Se desejar, deixe seu contato aqui (nome e telefone) e avisaremos assim que uma vaga for liberada."},
{t:"Escassez de Agenda",b:"SCRIPT",bc:"bs",x:"Olá! Como trabalho com casos de alta complexidade, as vagas para esta quinzena estão quase esgotadas. Recomendo verificar a disponibilidade no link agora para não ficarmos sem horário: https://cal.com/drfabioschmidt"}
]},
{t:"Família — Protocolo 7 Dias",i:"🏠",th:"tg",s:"Curso gravado + Livro Digital + PDF de Scripts",c:[
{t:"Mãe Desesperada / No Caos",b:"SCRIPT",bc:"bs",x:"Eu entendo o desespero de quando as crises dominam a casa. Parece que nada funciona. No Protocolo 7 Dias, eu entrego o treinamento em vídeo e os scripts em PDF para você retomar o controle. Acesse: https://h5jdksr45b-sys.github.io/landing/curso7.html"},
{t:"Mãe Brava / No Limite",b:"SCRIPT",bc:"bs",x:"Estar exausta não é falta de amor. No meu treinamento gravado, eu ensino como agir para que a conversa não vire briga e como desarmar a reatividade. Saiba mais: https://h5jdksr45b-sys.github.io/landing/curso7.html"},
{t:"Mãe Culpada / Sem Mapa",b:"SCRIPT",bc:"bs",x:"O erro não é por maldade, é por falta de um mapa do cérebro em crise. No Protocolo 7 Dias, você recebe o livro digital e o passo a passo para agir com estratégia em vez de culpa. Link: https://h5jdksr45b-sys.github.io/landing/curso7.html"},
{t:"Resposta de Direct (Lead de Vídeo)",b:"SCRIPT",bc:"bs",x:"Que bom que esse vídeo te ajudou a dar nome ao que está sentindo. Para aprofundar esse manejo na prática, eu recomendo o meu treinamento Protocolo 7 Dias. Ele é o primeiro passo antes da consulta: https://h5jdksr45b-sys.github.io/landing/curso7.html"}
]},
{t:"Biblioteca e Manuais em PDF",i:"📚",th:"tp",s:"Manuais práticos Vol. I e II",c:[
{t:"Acesso aos Manuais (Vol I e II)",b:"LINK",bc:"bl",x:"Meus manuais práticos em PDF (1ª e 2ª edição) estão disponíveis na minha biblioteca digital. Eles são guias diretos para consulta rápida sobre manejo de sintomas. Acesse aqui: https://h5jdksr45b-sys.github.io/landing/biblio.html"}
]},
{t:"Suno AI — Criação de Música",i:"🎵",th:"to",s:"Prompt mestre para gerar música com IA",c:[
{t:"Prompt Mestre ChatGPT → Suno",b:"PROMPT",bc:"bp",x:"Analise este vídeo que acabei de carregar. Identifique o ritmo, o tom emocional e as viradas de cena. Com base nisso, crie um prompt para o Suno AI com no máximo 500 caracteres. O estilo deve ser 'Dark Indie/Noir Cinematográfico'. Estruture o resultado com timestamps (0:00, 0:10, 0:30, 0:55) indicando onde entra o beat, onde aumenta a tensão e onde ocorre o fade-out, para que a música encaixe perfeitamente na edição deste vídeo."}
]},
{t:"Design e Imagem — Prompts IA",i:"🎨",th:"tr",s:"Midjourney / DALL·E / Leonardo",c:[
{t:"Estética Noir Dr. Fábio",b:"PROMPT",bc:"bp",x:"Professional cinematic photography, noir aesthetic, chiaroscuro lighting. High contrast, deep velvety blacks, sharp highlights. Medical doctor, clinical authority, serious and compassionate mood. 8k, photorealistic, moody atmosphere."},
{t:"Preservar Rosto e Melhorar Qualidade",b:"PROMPT",bc:"bp",x:"Preserve the original face features and expression exactly. Do not change identity. Increase skin texture detail, sharpen eyes, and enhance professional studio lighting. High-end clinical photography style."}
]},
{t:"Links Rápidos",i:"🔗",th:"tc",s:"Copie apenas o link direto",c:[
{t:"Link — Agendamento Cal.com",b:"LINK",bc:"bl",x:"https://cal.com/drfabioschmidt"},
{t:"Link — Protocolo 7 Dias",b:"LINK",bc:"bl",x:"https://h5jdksr45b-sys.github.io/landing/curso7.html"},
{t:"Link — Biblioteca de Manuais",b:"LINK",bc:"bl",x:"https://h5jdksr45b-sys.github.io/landing/biblio.html"}
]}
];

var app=document.getElementById('app'),toast=document.getElementById('toast'),tm=document.getElementById('tm'),fab=document.getElementById('fab'),tt;

function showToast(m){tm.textContent=m;toast.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){toast.classList.remove('show')},2000)}

function cp(txt,el,name){
  navigator.clipboard.writeText(txt).then(function(){
    el.classList.add('ok');
    showToast('✓  '+name);
    setTimeout(function(){el.classList.remove('ok')},2200);
  }).catch(function(){
    var ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    el.classList.add('ok');showToast('✓  '+name);setTimeout(function(){el.classList.remove('ok')},2200);
  });
}

var h='';
for(var i=0;i<S.length;i++){
  var sec=S[i];
  h+='<div class="sdiv '+sec.th+'"><div class="ico">'+sec.i+'</div><div><div class="lbl">'+sec.t+'</div><span class="sub">'+sec.s+'</span></div><div class="line"></div></div>';
  for(var j=0;j<sec.c.length;j++){
    var c=sec.c[j], id='c'+i+'_'+j;
    h+='<div class="card" id="'+id+'" onclick="cp(this.dataset.txt,this,this.dataset.name)" data-txt="'+c.x.replace(/"/g,'&quot;')+'" data-name="'+c.t.replace(/"/g,'&quot;')+'">';
    h+='<div class="card-h"><div class="card-t">'+c.t+' <span class="bg '+c.bc+'">'+c.b+'</span></div>';
    h+='<div class="cl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copiar</div></div>';
    h+='<div class="card-tx">'+c.x+'</div></div>';
  }
}
app.innerHTML=h;

window.addEventListener('scroll',function(){fab.classList.toggle('v',window.scrollY>300)});
</script>
</body>
</html>
