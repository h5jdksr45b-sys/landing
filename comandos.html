<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Fábio Schmidt — Arsenal Master</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0e1a;
    --surface:#111827;
    --surface-2:#1a2236;
    --surface-3:#1f2a40;
    --border:#253352;
    --accent:#3b82f6;
    --accent-glow:#2563eb;
    --accent-light:#60a5fa;
    --success:#10b981;
    --success-glow:#059669;
    --white:#f1f5f9;
    --muted:#94a3b8;
    --text:#e2e8f0;
    --text-dim:#64748b;
    --gold:#f59e0b;
    --red:#ef4444;
    --purple:#8b5cf6;
    --radius:12px;
    --radius-lg:16px;
    --shadow:0 4px 24px rgba(0,0,0,.4);
    --shadow-lg:0 8px 40px rgba(0,0,0,.5);
    --transition:all .3s cubic-bezier(.4,0,.2,1);
  }
  html{scroll-behavior:smooth}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    line-height:1.6;
    overflow-x:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background:
      radial-gradient(ellipse at 20% 0%,rgba(59,130,246,.08) 0%,transparent 60%),
      radial-gradient(ellipse at 80% 100%,rgba(139,92,246,.06) 0%,transparent 60%);
    pointer-events:none;z-index:0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--accent)}

  /* Header */
  .header{
    position:sticky;top:0;z-index:100;
    background:rgba(10,14,26,.85);
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    padding:16px 24px;
  }
  .header-inner{
    max-width:900px;margin:0 auto;
    display:flex;align-items:center;justify-content:space-between;
    gap:16px;flex-wrap:wrap;
  }
  .logo{display:flex;align-items:center;gap:12px}
  .logo-icon{
    width:42px;height:42px;border-radius:10px;
    background:linear-gradient(135deg,var(--accent),var(--purple));
    display:flex;align-items:center;justify-content:center;
    font-size:20px;color:#fff;font-weight:700;
    box-shadow:0 2px 12px rgba(59,130,246,.35);
  }
  .logo-text h1{font-size:18px;font-weight:700;color:var(--white);letter-spacing:-.3px}
  .logo-text span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:500}
  .header-actions{display:flex;gap:8px;align-items:center}
  .search-box{
    background:var(--surface);border:1px solid var(--border);
    border-radius:8px;padding:8px 12px 8px 36px;
    color:var(--text);font-size:14px;width:220px;
    transition:var(--transition);position:relative;
    outline:none;
  }
  .search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
  .search-wrapper{position:relative}
  .search-wrapper svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
  .btn-collapse-all{
    background:var(--surface);border:1px solid var(--border);
    color:var(--muted);font-size:12px;padding:8px 14px;
    border-radius:8px;cursor:pointer;transition:var(--transition);
    font-weight:500;white-space:nowrap;
  }
  .btn-collapse-all:hover{color:var(--white);border-color:var(--accent);background:var(--surface-2)}

  /* Main */
  .main{max-width:900px;margin:0 auto;padding:24px 16px 80px;position:relative;z-index:1}

  /* Stats Bar */
  .stats-bar{
    display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;
  }
  .stat-chip{
    background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:6px 14px;font-size:12px;
    color:var(--muted);display:flex;align-items:center;gap:6px;
    font-weight:500;
  }
  .stat-chip .dot{width:6px;height:6px;border-radius:50%}
  .dot-blue{background:var(--accent)}
  .dot-green{background:var(--success)}
  .dot-gold{background:var(--gold)}
  .dot-purple{background:var(--purple)}

  /* Section */
  .section{margin-bottom:20px}
  .section-header{
    display:flex;align-items:center;gap:12px;
    padding:14px 18px;cursor:pointer;
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-lg);transition:var(--transition);
    user-select:none;position:relative;overflow:hidden;
  }
  .section-header::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
    border-radius:0 2px 2px 0;transition:var(--transition);
  }
  .section-header:hover{background:var(--surface-2);border-color:var(--accent)}
  .section-header.active{
    border-radius:var(--radius-lg) var(--radius-lg) 0 0;
    border-bottom-color:transparent;
    background:var(--surface-2);
  }
  .section-icon{
    width:36px;height:36px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;flex-shrink:0;
  }
  .section-title{flex:1;font-size:15px;font-weight:600;color:var(--white)}
  .section-subtitle{font-size:11px;color:var(--muted);font-weight:400;display:block;margin-top:2px}
  .section-count{
    font-size:11px;color:var(--muted);background:var(--surface-3);
    padding:3px 8px;border-radius:6px;font-weight:600;
  }
  .section-chevron{
    color:var(--muted);transition:transform .3s ease;font-size:18px;
  }
  .section-header.active .section-chevron{transform:rotate(180deg)}

  /* Color themes per section */
  .theme-blue .section-header::before{background:var(--accent)}
  .theme-blue .section-icon{background:rgba(59,130,246,.12);color:var(--accent)}
  .theme-green .section-header::before{background:var(--success)}
  .theme-green .section-icon{background:rgba(16,185,129,.12);color:var(--success)}
  .theme-purple .section-header::before{background:var(--purple)}
  .theme-purple .section-icon{background:rgba(139,92,246,.12);color:var(--purple)}
  .theme-gold .section-header::before{background:var(--gold)}
  .theme-gold .section-icon{background:rgba(245,158,11,.12);color:var(--gold)}
  .theme-red .section-header::before{background:var(--red)}
  .theme-red .section-icon{background:rgba(239,68,68,.12);color:var(--red)}
  .theme-cyan .section-header::before{background:#06b6d4}
  .theme-cyan .section-icon{background:rgba(6,182,212,.12);color:#06b6d4}

  /* Cards Container */
  .cards-container{
    border:1px solid var(--border);border-top:none;
    border-radius:0 0 var(--radius-lg) var(--radius-lg);
    background:var(--surface);
    overflow:hidden;
    max-height:0;
    transition:max-height .45s cubic-bezier(.4,0,.2,1), opacity .3s ease;
    opacity:0;
  }
  .cards-container.open{max-height:3000px;opacity:1}
  .cards-inner{padding:8px 12px 12px}

  /* Card */
  .card{
    background:var(--surface-2);border:1px solid var(--border);
    border-radius:var(--radius);padding:16px;margin-bottom:8px;
    transition:var(--transition);position:relative;
  }
  .card:last-child{margin-bottom:0}
  .card:hover{border-color:rgba(59,130,246,.3);transform:translateY(-1px);box-shadow:var(--shadow)}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
  .card-label{
    font-size:13px;font-weight:600;color:var(--white);
    display:flex;align-items:center;gap:8px;
  }
  .card-badge{
    font-size:9px;text-transform:uppercase;letter-spacing:.8px;
    padding:2px 7px;border-radius:4px;font-weight:700;
  }
  .badge-script{background:rgba(59,130,246,.15);color:var(--accent-light)}
  .badge-prompt{background:rgba(139,92,246,.15);color:#a78bfa}
  .badge-link{background:rgba(16,185,129,.15);color:#6ee7b7}

  .card-text{
    font-size:13px;color:var(--muted);line-height:1.65;
    margin-bottom:14px;white-space:pre-wrap;word-break:break-word;
  }
  .card-text strong{color:var(--text);font-weight:600}
  .card-link{color:var(--accent-light);text-decoration:none;word-break:break-all}
  .card-link:hover{text-decoration:underline}

  .card-actions{display:flex;gap:6px;flex-wrap:wrap}
  .btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 14px;border-radius:8px;font-size:12px;
    font-weight:600;cursor:pointer;transition:var(--transition);
    border:none;outline:none;position:relative;overflow:hidden;
  }
  .btn svg{width:14px;height:14px;flex-shrink:0}
  .btn-copy{
    background:linear-gradient(135deg,var(--accent),var(--accent-glow));
    color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3);
  }
  .btn-copy:hover{box-shadow:0 4px 16px rgba(37,99,235,.45);transform:translateY(-1px)}
  .btn-copy:active{transform:translateY(0)}
  .btn-copy.copied{
    background:linear-gradient(135deg,var(--success),var(--success-glow));
    box-shadow:0 2px 8px rgba(5,150,105,.3);
  }
  .btn-link{
    background:var(--surface-3);color:var(--muted);border:1px solid var(--border);
  }
  .btn-link:hover{color:var(--white);border-color:var(--accent);background:var(--surface)}
  .btn-whatsapp{
    background:rgba(37,211,102,.12);color:#25d366;border:1px solid rgba(37,211,102,.2);
  }
  .btn-whatsapp:hover{background:rgba(37,211,102,.2);border-color:#25d366}

  /* Toast */
  .toast-container{
    position:fixed;bottom:24px;right:24px;z-index:9999;
    display:flex;flex-direction:column;gap:8px;
    pointer-events:none;
  }
  .toast{
    background:var(--surface-2);border:1px solid var(--success);
    color:var(--white);padding:12px 18px;border-radius:10px;
    font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);
    display:flex;align-items:center;gap:8px;
    transform:translateX(120%);transition:transform .35s cubic-bezier(.4,0,.2,1);
    pointer-events:auto;
  }
  .toast.show{transform:translateX(0)}
  .toast svg{color:var(--success);flex-shrink:0}

  /* Quick Access Floating */
  .fab-menu{
    position:fixed;bottom:24px;left:24px;z-index:100;
    display:flex;flex-direction:column;gap:8px;
  }
  .fab{
    width:48px;height:48px;border-radius:14px;border:none;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:var(--transition);font-size:18px;
    box-shadow:var(--shadow);
  }
  .fab-top{background:var(--surface-2);color:var(--muted);border:1px solid var(--border)}
  .fab-top:hover{color:var(--white);border-color:var(--accent);transform:translateY(-2px)}

  /* Responsive */
  @media(max-width:640px){
    .header-inner{justify-content:center}
    .search-box{width:100%;order:3}
    .search-wrapper{width:100%;order:3}
    .stats-bar{justify-content:center}
    .card-actions{flex-direction:column}
    .btn{justify-content:center}
    .fab-menu{bottom:16px;left:16px}
    .toast-container{bottom:16px;right:16px;left:16px}
    .toast{font-size:12px}
  }

  /* Animations */
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .section{animation:fadeUp .4s ease both}
  .section:nth-child(1){animation-delay:.05s}
  .section:nth-child(2){animation-delay:.1s}
  .section:nth-child(3){animation-delay:.15s}
  .section:nth-child(4){animation-delay:.2s}
  .section:nth-child(5){animation-delay:.25s}
  .section:nth-child(6){animation-delay:.3s}

  /* Pulse for copy */
  @keyframes pulse-success{0%{box-shadow:0 0 0 0 rgba(16,185,129,.4)}70%{box-shadow:0 0 0 8px rgba(16,185,129,0)}100%{box-shadow:0 0 0 0 rgba(16,185,129,0)}}
  .btn-copy.copied{animation:pulse-success .6s ease}

  /* hidden helper */
  .hidden{display:none!important}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">FS</div>
      <div class="logo-text">
        <h1>Arsenal Master</h1>
        <span>Dr. Fábio Schmidt</span>
      </div>
    </div>
    <div class="header-actions">
      <div class="search-wrapper">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-box" id="searchBox" placeholder="Buscar script ou prompt…">
      </div>
